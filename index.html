<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbook — Your group chat, made into a book.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; }
    @keyframes bookfloat {
      0%, 100% { transform: rotateY(-16deg) rotateX(4deg) translateY(0); }
      50%       { transform: rotateY(-16deg) rotateX(4deg) translateY(-8px); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const vibes = [
      { id: "crimson", label: "Crimson", cover: "#6B0000", spine: "#3d0000", gold: "#C9A84C", quote: "The whole crew, preserved forever.", title: "The Originals" },
      { id: "navy",    label: "Navy",    cover: "#1B2A4A", spine: "#0f1a2e", gold: "#D4AF6A", quote: "From Slack chaos to something beautiful.", title: "Work Wives" },
      { id: "forest",  label: "Forest",  cover: "#2D4A35", spine: "#1a2e20", gold: "#C8B97A", quote: "Every late night. Every Sunday morning.", title: "The House" },
      { id: "slate",   label: "Slate",   cover: "#3A3F4A", spine: "#22262f", gold: "#E2C97E", quote: "The thread that holds everything together.", title: "Family Chat" },
      { id: "plum",    label: "Plum",    cover: "#4A1A4A", spine: "#2e0e2e", gold: "#D4A8D4", quote: "Years of chaos, bound in one place.", title: "The Besties" },
      { id: "black",   label: "Black",   cover: "#111111", spine: "#000000", gold: "#C9A84C", quote: "Clean. Simple. Forever.", title: "The Originals" },
      { id: "tan",     label: "Tan",     cover: "#C4A882", spine: "#a08860", gold: "#7a5c2e", quote: "Warm, worn, and wonderfully yours.", title: "The Originals" },
      { id: "white",   label: "White",   cover: "#F0EBE0", spine: "#d8d0c0", gold: "#8B6914", quote: "Minimal. Timeless. Yours.", title: "The Originals" },
    ];

    const useCases = [
      { emoji: "🏠", title: "The house",         desc: "Four years of roommate chaos, grocery debates, and 2am pizza runs. The group chat was the connective tissue.", tag: "College · Roommates" },
      { emoji: "👨‍👩‍👧‍👦", title: "The family thread", desc: "The one where grandma finally learned to use GIFs. Every birthday, every holiday, every check-in.", tag: "Family · Memory" },
      { emoji: "💼", title: "The work crew",     desc: "Three years of Slack spirals and off-site inside jokes. A going-away gift that actually means something.", tag: "Coworkers · Gifts" },
      { emoji: "💍", title: "The wedding party", desc: "From the proposal reaction to the night-before panic texts. The bridal party chat is basically a documentary.", tag: "Wedding · Celebration" },
      { emoji: "🎓", title: "The friend group",  desc: "The chat that's been going since sophomore year. Nobody ever leaves, nobody ever mutes it.", tag: "Friends · Nostalgia" },
      { emoji: "✈️", title: "The trip",          desc: "The planning chaos, the meltdowns, the moments you'll quote forever. One trip, one book.", tag: "Travel · Adventure" },
    ];

    const faqs = [
      { q: "What chat platforms do you support?", a: "Right now we support WhatsApp exports — just export your chat from the app and send it our way. iMessage support is coming very soon. If you have a different platform, reach out and we'll figure it out." },
      { q: "How long does it take?", a: "Once we receive your chat export, we typically turn around a print-ready proof within a few days. Shipping takes another 1–2 weeks depending on your location. Total: about 2 weeks from start to doorstep." },
      { q: "What does the book actually look like?", a: "It's an 8.5×11 hardcover with a linen wrap in your chosen color, gold foil lettering on the spine, and interior pages typeset to look like a real publication — not a printout of your phone screen." },
      { q: "Can I see a proof before it prints?", a: "Yes. We'll send you a PDF proof to review before we send anything to print. You'll have a chance to request edits." },
      { q: "What if my chat has thousands of messages?", a: "That's kind of the point. We use episode breaks to divide long chats into chapters — similar to how a TV season is structured. We'll work with you to figure out the right scope for your book." },
      { q: "Can I use nicknames instead of real names?", a: "Absolutely — and we recommend it. Nicknames make the book feel more personal and protect privacy for people in the chat who didn't explicitly sign up to be in a book." },
      { q: "What's the refund policy?", a: "Because each book is custom printed, we don't accept returns. But if something arrives damaged or wrong, we'll reprint it at no cost. We stand behind the quality." },
      { q: "Do you keep my chat data?", a: "No. Your chat export is used only to produce your book and is deleted after the project is complete. We never store, share, or use your messages for any other purpose. See our Privacy page for the full details." },
    ];

    const T = {
      tag:  { fontSize: 10, fontWeight: 500, letterSpacing: "0.2em", textTransform: "uppercase", color: "#ccc", marginBottom: 12 },
      h2:   { fontFamily: "'Playfair Display', serif", fontSize: 28, fontWeight: 700, lineHeight: 1.15, color: "#111", marginBottom: 40 },
      back: { background: "none", border: "none", fontSize: 12, color: "#999", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", marginBottom: 32, padding: 0 },
      cta:  { width: "100%", padding: "14px 0", marginTop: 32, background: "#111", color: "#fff", border: "none", fontSize: 14, fontWeight: 500, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" },
      wrap: { padding: "48px 24px 64px" },
    };

    function Book({ vibe }) {
      return (
        <div style={{ perspective: "900px", display: "flex", justifyContent: "center" }}>
          <div style={{
            position: "relative",
            transform: "rotateY(-16deg) rotateX(4deg)",
            transformStyle: "preserve-3d",
            filter: "drop-shadow(-12px 20px 36px rgba(0,0,0,0.18))",
            animation: "bookfloat 5s ease-in-out infinite",
          }}>
            <div style={{ position:"absolute", left:-18, top:0, width:18, height:320, background:vibe.spine, transform:"rotateY(-90deg) translateX(-9px)", transformOrigin:"right center", borderRadius:"2px 0 0 2px", transition:"background 0.4s" }} />
            <div style={{ width:240, height:320, borderRadius:"2px 4px 4px 2px", overflow:"hidden", position:"relative" }}>
              <div style={{ position:"absolute", inset:0, background:vibe.cover, transition:"background 0.4s" }} />
              <div style={{ position:"absolute", inset:0, backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px),repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(255,255,255,0.008) 3px,rgba(255,255,255,0.008) 6px)" }} />
              <div style={{ position:"absolute", inset:12, border:"1px solid rgba(255,255,255,0.13)" }} />
              <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center", padding:28 }}>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700, color:vibe.gold, lineHeight:1.2, marginBottom:8, transition:"color 0.4s" }}>{vibe.title}</div>
                <div style={{ width:28, height:1, background:vibe.gold+"55", margin:"0 auto 8px" }} />
                <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:8, fontWeight:400, letterSpacing:"0.22em", textTransform:"uppercase", color:vibe.gold+"88" }}>Season 1</div>
              </div>
              <div style={{ position:"absolute", bottom:14, left:0, right:0, textAlign:"center", fontFamily:"'DM Sans',sans-serif", fontSize:7, letterSpacing:"0.3em", textTransform:"uppercase", color:"rgba(255,255,255,0.18)" }}>Chatbook</div>
              <div style={{ position:"absolute", right:-5, top:3, width:6, height:314, backgroundImage:"repeating-linear-gradient(to bottom,#ece4d8 0px,#ece4d8 1px,#f4ece0 1px,#f4ece0 3px)", borderRadius:"0 2px 2px 0" }} />
            </div>
          </div>
        </div>
      );
    }

    function BackBtn({ onClick }) {
      return <button onClick={onClick} style={T.back}>← Back</button>;
    }

    function PageCTA() {
      return <a href="/order.html" style={{ ...T.cta, display:"block", textAlign:"center", textDecoration:"none" }}>Start your book</a>;
    }

    function Chatbook() {
      const [active, setActive] = useState(vibes[0]);
      const [section, setSection] = useState("home");
      const [openFaq, setOpenFaq] = useState(null);
      const [menuOpen, setMenuOpen] = useState(false);
      const [isDesktop, setIsDesktop] = React.useState(window.innerWidth >= 768);
      React.useEffect(() => {
        const handler = () => setIsDesktop(window.innerWidth >= 768);
        window.addEventListener('resize', handler);
        return () => window.removeEventListener('resize', handler);
      }, []);

      const go = (s) => { setSection(s); setMenuOpen(false); };

      return (
        <div style={{ background:"#fff", minHeight:"100vh", fontFamily:"'DM Sans',sans-serif", fontWeight:300, color:"#111" }}>

          {/* NAV */}
          <nav style={{ background:"#fff", borderBottom:"1px solid #f0f0f0", padding:"16px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100 }}>
            <button onClick={() => go("home")} style={{ fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700, color:"#111", background:"none", border:"none", cursor:"pointer", padding:0 }}>Chatbook</button>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <button onClick={() => setMenuOpen(!menuOpen)} style={{ background:"none", border:"1px solid #e0e0e0", padding:"7px 12px", fontSize:12, color:"#666", cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>Menu</button>
              <a href="/order.html" style={{ background:"#111", border:"none", padding:"8px 16px", fontSize:12, fontWeight:500, color:"#fff", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", textDecoration:"none" }}>Start your book</a>
            </div>
          </nav>

          {/* MENU DRAWER */}
          {menuOpen && (
            <div style={{ background:"#fff", borderBottom:"1px solid #f0f0f0", padding:"8px 24px 16px" }}>
              {[["how","How it works"],["uses","Use cases"],["faq","FAQ"],["privacy","Privacy"],["affiliate","Refer & earn"]].map(([id,label]) => (
                <button key={id} onClick={() => go(id)} style={{ display:"block", width:"100%", textAlign:"left", background:"none", border:"none", padding:"12px 0", fontSize:14, color:"#333", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", borderBottom:"1px solid #f5f5f5" }}>{label}</button>
              ))}
            </div>
          )}

          {/* HOME */}
          {section === "home" && (
            <div style={{ ...T.wrap, maxWidth: isDesktop ? 1100 : "none", margin: "0 auto" }}>
              <div style={{ display: isDesktop ? "flex" : "block", gap: isDesktop ? 60 : 0, alignItems: "flex-start" }}>
                {/* LEFT: book */}
                <div style={{ flex: isDesktop ? "0 0 40%" : "none", marginBottom: isDesktop ? 0 : 40, paddingTop: isDesktop ? 8 : 0 }}>
                  <Book vibe={active} />
                </div>

                {/* RIGHT: content */}
                <div style={{ flex: isDesktop ? "0 0 60%" : "none" }}>
                  <h1 style={{ fontFamily:"'Playfair Display',serif", fontSize: isDesktop ? 42 : 32, fontWeight:700, lineHeight:1.15, color:"#111", marginBottom:14 }}>Your group chat,<br />made into a book.</h1>
                  <p style={{ fontSize:15, fontWeight:300, lineHeight:1.7, color:"#777", marginBottom:36 }}>Every inside joke, every late night — typeset, printed, and shipped as a premium hardcover.</p>

                  <div style={T.tag}>Pick a cover</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:12 }}>
                    {vibes.map(v => (
                      <button key={v.id} onClick={() => setActive(v)} style={{
                        background: v.cover,
                        border: active.id === v.id ? "2px solid #111" : "2px solid transparent",
                        borderRadius: 2, padding:"7px 15px",
                        color: (v.id==="white"||v.id==="tan") ? "rgba(0,0,0,0.65)" : "rgba(255,255,255,0.9)",
                        fontSize:12, fontWeight:500, cursor:"pointer", fontFamily:"'DM Sans',sans-serif",
                        opacity: active.id === v.id ? 1 : 0.6,
                        boxShadow: active.id === v.id ? "0 2px 10px rgba(0,0,0,0.2)" : "none",
                        transition:"all 0.15s ease",
                      }}>{v.label}</button>
                    ))}
                    <label style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 15px", border: active.id==="custom" ? "2px solid #111" : "2px dashed #ddd", borderRadius:2, fontSize:12, fontWeight:500, color: active.id==="custom" ? "rgba(255,255,255,0.9)" : "#aaa", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", background: active.id==="custom" ? active.cover : "#fff", position:"relative" }}>
                      <input type="color" defaultValue="#8B4513" style={{ width:0, height:0, opacity:0, position:"absolute" }} onChange={e => {
                        const hex = e.target.value;
                        const r = Math.max(0,parseInt(hex.slice(1,3),16)-40), g = Math.max(0,parseInt(hex.slice(3,5),16)-40), b = Math.max(0,parseInt(hex.slice(5,7),16)-40);
                        const light = (parseInt(hex.slice(1,3),16)+parseInt(hex.slice(3,5),16)+parseInt(hex.slice(5,7),16))/3;
                        setActive({ id:"custom", label:"Custom", cover:hex, spine:`rgb(${r},${g},${b})`, gold:light>160?"#7a5c2e":"#C9A84C", quote:"Made it your own.", title:"The Originals" });
                      }} />
                      + Custom
                    </label>
                  </div>
                  <div style={{ fontSize:13, color:"#ccc", marginBottom:32, minHeight:20 }}>{active.quote}</div>

                  <div style={{ display:"flex", alignItems:"center", gap:16, flexWrap:"wrap" }}>
                    <a href="/order.html" style={{ background:"#111", color:"#fff", border:"none", padding:"13px 28px", fontSize:14, fontWeight:500, cursor:"pointer", fontFamily:"'DM Sans',sans-serif", textDecoration:"none" }}>Start your book</a>
                    <span style={{ fontSize:12, color:"#ccc" }}>$89 · Ships in ~2 weeks</span>
                  </div>
                </div>
              </div>

              <div style={{ marginTop:48, borderTop:"1px solid #f0f0f0", paddingTop:24, display:"flex", flexDirection:"column", gap:10 }}>
                {[["how","How it works"],["uses","Who it's for"],["faq","FAQ"],["privacy","Privacy"],["affiliate","Refer & earn"]].map(([id,label]) => (
                  <button key={id} onClick={() => go(id)} style={{ width:"100%", padding:"13px 0", background:"#fafafa", border:"1px solid #f0f0f0", fontSize:13, fontWeight:400, color:"#555", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", textAlign:"left", paddingLeft:16, display:"flex", justifyContent:"space-between", paddingRight:16 }}>
                    <span>{label}</span><span style={{ color:"#ccc" }}>→</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* HOW IT WORKS */}
          {section === "how" && (
            <div style={T.wrap}>
              <BackBtn onClick={() => go("home")} />
              <div style={T.tag}>How it works</div>
              <h2 style={T.h2}>Three steps. One book you'll keep forever.</h2>
              {[
                { n:"1", title:"Send your chat", body:"Export your group thread and send it our way. We support iMessage, WhatsApp, and more. Your data stays private — we never store it." },
                { n:"2", title:"We design it",   body:"We format your messages into a beautifully typeset book — with episode breaks, nicknames, photos, and front matter that makes it feel like a real publication." },
                { n:"3", title:"It arrives",     body:"A premium linen-wrap hardcover, 8.5×11, gold foil spine. The kind of thing that lives on a coffee table for decades." },
              ].map(s => (
                <div key={s.n} style={{ marginBottom:40, paddingBottom:40, borderBottom:"1px solid #f0f0f0" }}>
                  <div style={{ fontFamily:"'Playfair Display',serif", fontSize:48, fontWeight:700, color:"#f0f0f0", lineHeight:1, marginBottom:12 }}>{s.n}</div>
                  <div style={{ fontSize:16, fontWeight:500, color:"#111", marginBottom:8 }}>{s.title}</div>
                  <div style={{ fontSize:14, fontWeight:300, lineHeight:1.7, color:"#888" }}>{s.body}</div>
                </div>
              ))}
              <PageCTA />
            </div>
          )}

          {/* USE CASES */}
          {section === "uses" && (
            <div style={T.wrap}>
              <BackBtn onClick={() => go("home")} />
              <div style={T.tag}>Who it's for</div>
              <h2 style={T.h2}>Every group has a story worth printing.</h2>
              <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
                {useCases.map(u => (
                  <div key={u.title} style={{ background:"#fafafa", border:"1px solid #f0f0f0", padding:"24px 20px" }}>
                    <div style={{ fontSize:24, marginBottom:12 }}>{u.emoji}</div>
                    <div style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:700, color:"#111", marginBottom:8 }}>{u.title}</div>
                    <div style={{ fontSize:13, fontWeight:300, lineHeight:1.7, color:"#888", marginBottom:12 }}>{u.desc}</div>
                    <div style={{ fontSize:10, fontWeight:500, letterSpacing:"0.15em", textTransform:"uppercase", color:"#ccc" }}>{u.tag}</div>
                  </div>
                ))}
              </div>
              <PageCTA />
            </div>
          )}

          {/* FAQ */}
          {section === "faq" && (
            <div style={T.wrap}>
              <BackBtn onClick={() => go("home")} />
              <div style={T.tag}>FAQ</div>
              <h2 style={T.h2}>Questions, answered.</h2>
              <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                {faqs.map((f,i) => (
                  <div key={i} style={{ borderBottom:"1px solid #f0f0f0" }}>
                    <button onClick={() => setOpenFaq(openFaq===i ? null : i)} style={{ width:"100%", textAlign:"left", background:"none", border:"none", padding:"18px 0", fontSize:14, fontWeight:500, color:"#111", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", display:"flex", justifyContent:"space-between", alignItems:"center", gap:16 }}>
                      <span>{f.q}</span>
                      <span style={{ color:"#ccc", fontSize:18, flexShrink:0 }}>{openFaq===i ? "−" : "+"}</span>
                    </button>
                    {openFaq===i && (
                      <div style={{ fontSize:14, fontWeight:300, lineHeight:1.75, color:"#777", paddingBottom:18 }}>{f.a}</div>
                    )}
                  </div>
                ))}
              </div>
              <div style={{ marginTop:32, padding:"20px", background:"#fafafa", border:"1px solid #f0f0f0" }}>
                <div style={{ fontSize:13, fontWeight:500, color:"#111", marginBottom:6 }}>Still have questions?</div>
                <div style={{ fontSize:13, fontWeight:300, color:"#888" }}>Email us at <span style={{ color:"#111", borderBottom:"1px solid #ddd" }}>hello@ourchatbook.com</span> and we'll get back to you within a day.</div>
              </div>
              <PageCTA />
            </div>
          )}

          {/* PRIVACY */}
          {section === "privacy" && (
            <div style={T.wrap}>
              <BackBtn onClick={() => go("home")} />
              <div style={T.tag}>Privacy</div>
              <h2 style={{ ...T.h2, marginBottom:16 }}>Your conversations are yours.</h2>
              <p style={{ fontSize:15, fontWeight:300, lineHeight:1.75, color:"#777", marginBottom:40 }}>We built Chatbook around a simple belief: the messages in your group chat are private by nature. Our job is to turn them into something beautiful — not to store, analyze, or profit from them.</p>

              {[
                { title:"We never store your messages", body:"Your chat export is used only to produce your book. Once the project is complete and you've approved your proof, the raw export is permanently deleted from our systems. We don't keep copies." },
                { title:"We never share your data", body:"Your messages are never shared with third parties, sold to advertisers, or used to train any AI systems. What's in your chat stays between you and us — and then it's gone." },
                { title:"We never read your messages", body:"Our pipeline processes your chat export automatically. No human at Chatbook reads your messages unless you specifically ask us to help with a design question and share a portion yourself." },
                { title:"Nicknames by default", body:"We recommend using nicknames for everyone in your book rather than real names. It protects the privacy of people in the chat who didn't explicitly consent to being in a printed publication — and honestly, it makes the book more fun." },
                { title:"Your book is yours", body:"Once your book is printed and shipped, it belongs to you entirely. We retain no rights to reproduce, display, or distribute any of its contents." },
              ].map((s,i) => (
                <div key={i} style={{ marginBottom:36, paddingBottom:36, borderBottom:"1px solid #f0f0f0" }}>
                  <div style={{ fontSize:15, fontWeight:500, color:"#111", marginBottom:8 }}>{s.title}</div>
                  <div style={{ fontSize:14, fontWeight:300, lineHeight:1.75, color:"#888" }}>{s.body}</div>
                </div>
              ))}

              <div style={{ padding:"20px", background:"#fafafa", border:"1px solid #f0f0f0", marginBottom:16 }}>
                <div style={{ fontSize:13, fontWeight:500, color:"#111", marginBottom:6 }}>Questions about privacy?</div>
                <div style={{ fontSize:13, fontWeight:300, color:"#888" }}>Email <span style={{ color:"#111", borderBottom:"1px solid #ddd" }}>privacy@ourchatbook.com</span> and we'll respond within 48 hours.</div>
              </div>
            </div>
          )}

          {/* AFFILIATE */}
          {section === "affiliate" && (
            <div style={T.wrap}>
              <BackBtn onClick={() => go("home")} />
              <div style={T.tag}>Refer & earn</div>
              <h2 style={T.h2}>Share Chatbook. Get paid.</h2>
              <p style={{ fontSize:15, fontWeight:300, lineHeight:1.75, color:"#777", marginBottom:40 }}>Know someone whose group chat deserves a book? Refer them and earn a commission on every order you send our way — no limits, no expiry.</p>

              <div style={{ display:"flex", flexDirection:"column", gap:16, marginBottom:40 }}>
                {[
                  { n:"1", title:"Get your link", body:"Sign up and we'll give you a unique referral link to share however you want — text, Instagram, group chat, wherever." },
                  { n:"2", title:"Share it",      body:"Share your link with friends, post it, put it in your bio. Anyone who orders through your link counts as your referral." },
                  { n:"3", title:"Earn $15",      body:"You earn $15 for every book ordered through your link. Paid out monthly via PayPal or Venmo, no minimum threshold." },
                ].map(s => (
                  <div key={s.n} style={{ background:"#fafafa", border:"1px solid #f0f0f0", padding:"24px 20px", display:"flex", gap:20, alignItems:"flex-start" }}>
                    <div style={{ fontFamily:"'Playfair Display',serif", fontSize:32, fontWeight:700, color:"#e8e8e8", lineHeight:1, flexShrink:0 }}>{s.n}</div>
                    <div>
                      <div style={{ fontSize:15, fontWeight:500, color:"#111", marginBottom:6 }}>{s.title}</div>
                      <div style={{ fontSize:13, fontWeight:300, lineHeight:1.7, color:"#888" }}>{s.body}</div>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{ background:"#111", padding:"28px 24px", marginBottom:16 }}>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, fontWeight:700, color:"#fff", marginBottom:8 }}>$15 per book.</div>
                <div style={{ fontSize:13, fontWeight:300, color:"#aaa", marginBottom:20, lineHeight:1.6 }}>No cap. No expiry. The more you share, the more you earn.</div>
                <button style={{ background:"#C9A84C", color:"#111", border:"none", padding:"13px 28px", fontSize:14, fontWeight:500, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>Get my referral link</button>
              </div>

              <div style={{ fontSize:12, fontWeight:300, color:"#bbb", lineHeight:1.7 }}>
                Referral commissions are tracked via cookie for 30 days from first click. Payouts are processed monthly. Self-referrals don't count. Questions? Email <span style={{ color:"#999", borderBottom:"1px solid #ddd" }}>affiliates@ourchatbook.com</span>
              </div>
            </div>
          )}

          {/* FOOTER */}
          <div style={{ borderTop:"1px solid #f0f0f0", padding:"24px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:14, fontWeight:700, color:"#111" }}>Chatbook</div>
            <div style={{ display:"flex", gap:16 }}>
              {[["privacy","Privacy"],["faq","FAQ"],["affiliate","Refer & earn"]].map(([id,label]) => (
                <button key={id} onClick={() => go(id)} style={{ background:"none", border:"none", fontSize:11, color:"#ccc", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", padding:0 }}>{label}</button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Chatbook />);
  </script>
</body>
</html>
