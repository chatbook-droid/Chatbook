<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build Your Chatbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: 'DM Sans', sans-serif; }
    @keyframes bookfloat {
      0%, 100% { transform: rotateY(-16deg) rotateX(4deg) translateY(0); }
      50%       { transform: rotateY(-16deg) rotateX(4deg) translateY(-8px); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const VIBES = [
      { id:"crimson", label:"Crimson", cover:"#6B0000", spine:"#3d0000", gold:"#C9A84C" },
      { id:"navy",    label:"Navy",    cover:"#1B2A4A", spine:"#0f1a2e", gold:"#D4AF6A" },
      { id:"forest",  label:"Forest",  cover:"#2D4A35", spine:"#1a2e20", gold:"#C8B97A" },
      { id:"slate",   label:"Slate",   cover:"#3A3F4A", spine:"#22262f", gold:"#E2C97E" },
      { id:"plum",    label:"Plum",    cover:"#4A1A4A", spine:"#2e0e2e", gold:"#D4A8D4" },
      { id:"black",   label:"Black",   cover:"#111111", spine:"#000000", gold:"#C9A84C" },
      { id:"tan",     label:"Tan",     cover:"#C4A882", spine:"#a08860", gold:"#7a5c2e" },
      { id:"white",   label:"White",   cover:"#F0EBE0", spine:"#d8d0c0", gold:"#8B6914" },
    ];

    const FOILS = [
      { id:"gold",   label:"Gold",   color:"#C9A84C" },
      { id:"silver", label:"Silver", color:"#C0C0C0" },
      { id:"white",  label:"White",  color:"#F5F5F5" },
    ];

    // ─────────────────────────────────────────────
    // BUG 1 FIX: robust WhatsApp name parser
    // Handles both iOS [MM/DD/YY, H:MM:SS AM] Name: msg
    // and Android MM/DD/YY, H:MM AM - Name: msg
    // and Android (EU) DD/MM/YYYY, HH:MM - Name: msg
    // Reads entire file, strips tildes, skips system lines
    // ─────────────────────────────────────────────
    function parseParticipants(text) {
      const lines = text.split("\n");

      // iOS format:  [12/25/23, 10:30:45 AM] Name: message
      const iosRe = /^\[\d{1,2}\/\d{1,2}\/\d{2,4},\s*\d{1,2}:\d{2}(?::\d{2})?\s*[AaPp][Mm]\]\s*([^:]+?):/;

      // Android US:  12/25/23, 10:30 AM - Name: message
      // Android EU:  25/12/2023, 10:30 - Name: message
      // Android 24h: 25/12/2023, 22:30 - Name: message
      const androidRe = /^\d{1,2}\/\d{1,2}\/\d{2,4},\s*\d{1,2}:\d{2}(?::\d{2})?(?:\s*[AaPp][Mm])?\s*-\s*([^:]+?):/;

      const SYSTEM_PATTERNS = [
        /^Messages and calls are end-to-end encrypted/i,
        /joined using this group/i,
        /was added$/i,
        /left$/i,
        /changed the group/i,
        /changed this group/i,
        /changed the subject/i,
        /deleted this message/i,
        /This message was deleted/i,
        /security code changed/i,
        /Your security code/i,
        /created group/i,
        /added you$/i,
        /^\+?[\d\s\(\)\-]{7,}$/, // raw phone number as sender
      ];

      const nameSet = new Set();

      for (const line of lines) {
        let match = line.match(iosRe) || line.match(androidRe);
        if (!match) continue;

        let name = match[1].trim();

        // strip leading tilde (WhatsApp ~ prefix for saved contacts)
        name = name.replace(/^~+/, "").trim();

        // skip empty or implausibly long names
        if (!name || name.length > 60) continue;

        // skip system messages masquerading as senders
        const isSystem = SYSTEM_PATTERNS.some(re => re.test(name));
        if (isSystem) continue;

        // skip pure-digit strings (timestamps leaking through)
        if (/^\d+$/.test(name)) continue;

        nameSet.add(name);
      }

      return [...nameSet];
    }

    // ─────────────────────────────────────────────
    // BUG 2 FIX: AddrForm defined at module level so
    // React never unmounts it during Screen7 re-renders
    // ─────────────────────────────────────────────
    function AddrForm({ addr, onChange, label }) {
      return (
        <div style={{ border:"1px solid #e0e0e0", padding:16, marginBottom:12 }}>
          {label && <div style={{ fontSize:12, fontWeight:500, color:"#aaa", letterSpacing:"0.1em", marginBottom:12 }}>{label}</div>}
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            <input
              type="text" value={addr.name} placeholder="Full name"
              onChange={e => onChange("name", e.target.value)}
              style={inputStyle}
            />
            <input
              type="text" value={addr.line1} placeholder="Street address"
              onChange={e => onChange("line1", e.target.value)}
              style={inputStyle}
            />
            <input
              type="text" value={addr.line2||""} placeholder="Apt, suite, etc. (optional)"
              onChange={e => onChange("line2", e.target.value)}
              style={inputStyle}
            />
            <div style={{ display:"flex", gap:8 }}>
              <input type="text" value={addr.city} placeholder="City"
                onChange={e => onChange("city", e.target.value)}
                style={{ ...inputStyle, flex:2 }} />
              <input type="text" value={addr.state} placeholder="State"
                onChange={e => onChange("state", e.target.value)}
                style={{ ...inputStyle, flex:1 }} />
              <input type="text" value={addr.zip} placeholder="ZIP"
                onChange={e => onChange("zip", e.target.value)}
                style={{ ...inputStyle, flex:1 }} />
            </div>
          </div>
        </div>
      );
    }

    // shared input style used across the file
    const inputStyle = {
      width:"100%", padding:"11px 14px", border:"1px solid #e0e0e0",
      fontSize:14, fontWeight:300, color:"#111", outline:"none",
      fontFamily:"'DM Sans',sans-serif", background:"#fff",
    };

    // ── Shared UI primitives ──

    // Fix 3: added dateRange prop — displays below season label on book face
    function Book({ cover, spine, foilColor, title, season, dateRange }) {
      return (
        <div style={{ perspective:"900px", display:"flex", justifyContent:"center" }}>
          <div style={{
            position:"relative", transform:"rotateY(-16deg) rotateX(4deg)",
            transformStyle:"preserve-3d",
            filter:"drop-shadow(-12px 20px 36px rgba(0,0,0,0.18))",
            animation:"bookfloat 5s ease-in-out infinite",
          }}>
            <div style={{ position:"absolute", left:-18, top:0, width:18, height:320, background:spine, transform:"rotateY(-90deg) translateX(-9px)", transformOrigin:"right center", borderRadius:"2px 0 0 2px", transition:"background 0.4s" }} />
            <div style={{ width:240, height:320, borderRadius:"2px 4px 4px 2px", overflow:"hidden", position:"relative" }}>
              <div style={{ position:"absolute", inset:0, background:cover, transition:"background 0.4s" }} />
              <div style={{ position:"absolute", inset:0, backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px),repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(255,255,255,0.008) 3px,rgba(255,255,255,0.008) 6px)" }} />
              <div style={{ position:"absolute", inset:12, border:"1px solid rgba(255,255,255,0.13)" }} />
              <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center", padding:28 }}>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700, color:foilColor, lineHeight:1.2, marginBottom:8, transition:"color 0.4s" }}>{title || "Your Book"}</div>
                <div style={{ width:28, height:1, background:foilColor+"55", margin:"0 auto 8px" }} />
                <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:8, fontWeight:400, letterSpacing:"0.22em", textTransform:"uppercase", color:foilColor+"88" }}>Season {season || 1}</div>
                {dateRange && <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:7, fontWeight:300, letterSpacing:"0.12em", color:foilColor+"66", marginTop:5 }}>{dateRange}</div>}
              </div>
              <div style={{ position:"absolute", bottom:14, left:0, right:0, textAlign:"center", fontFamily:"'DM Sans',sans-serif", fontSize:7, letterSpacing:"0.3em", textTransform:"uppercase", color:"rgba(255,255,255,0.18)" }}>Chatbook</div>
              <div style={{ position:"absolute", right:-5, top:3, width:6, height:314, backgroundImage:"repeating-linear-gradient(to bottom,#ece4d8 0px,#ece4d8 1px,#f4ece0 1px,#f4ece0 3px)", borderRadius:"0 2px 2px 0" }} />
            </div>
          </div>
        </div>
      );
    }

    function ProgressBar({ step, total }) {
      return (
        <div style={{ padding:"16px 24px 0", maxWidth:720, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
            <span style={{ fontSize:11, fontWeight:500, letterSpacing:"0.15em", textTransform:"uppercase", color:"#aaa" }}>Step {step} of {total}</span>
            <span style={{ fontSize:11, color:"#ccc" }}>{Math.round((step/total)*100)}% complete</span>
          </div>
          <div style={{ height:3, background:"#f0f0f0", borderRadius:2 }}>
            <div style={{ height:"100%", background:"#111", borderRadius:2, width:`${(step/total)*100}%`, transition:"width 0.4s ease" }} />
          </div>
        </div>
      );
    }

    function Nav() {
      return (
        <nav style={{ background:"#fff", borderBottom:"1px solid #f0f0f0", padding:"16px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100 }}>
          <a href="/index.html" style={{ fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700, color:"#111", textDecoration:"none" }}>Chatbook</a>
          <span style={{ fontSize:12, color:"#aaa", fontFamily:"'DM Sans',sans-serif" }}>Build your book</span>
        </nav>
      );
    }

    function Btn({ onClick, children, disabled, variant="primary", style:s={} }) {
      const base = { padding:"13px 28px", fontSize:14, fontWeight:500, cursor:disabled?"not-allowed":"pointer", fontFamily:"'DM Sans',sans-serif", border:"none", transition:"opacity 0.15s", opacity:disabled?0.4:1, ...s };
      const styles = variant==="primary" ? { ...base, background:"#111", color:"#fff" } : { ...base, background:"#fff", color:"#555", border:"1px solid #e0e0e0" };
      return <button onClick={disabled?undefined:onClick} style={styles}>{children}</button>;
    }

    function NavBtns({ onBack, onNext, nextLabel="Next →", nextDisabled=false, loading=false }) {
      return (
        <div style={{ display:"flex", gap:12, marginTop:40, paddingTop:24, borderTop:"1px solid #f0f0f0" }}>
          {onBack && <Btn variant="secondary" onClick={onBack}>← Back</Btn>}
          <Btn onClick={onNext} disabled={nextDisabled||loading} style={{ marginLeft:"auto" }}>
            {loading ? "Loading…" : nextLabel}
          </Btn>
        </div>
      );
    }

    function FieldLabel({ children }) {
      return <div style={{ fontSize:10, fontWeight:500, letterSpacing:"0.15em", textTransform:"uppercase", color:"#aaa", marginBottom:8 }}>{children}</div>;
    }

    function ErrorMsg({ msg }) {
      if (!msg) return null;
      return <div style={{ marginTop:8, fontSize:12, color:"#c00" }}>{msg}</div>;
    }

    // ══════════════════════════════════════════════
    // SCREEN 1 — Platform grid + Upload / Waitlist
    // WhatsApp: selected by default, shows upload flow
    // Coming soon: shows waitlist panel
    // Other: shows "what platform?" + email
    // ══════════════════════════════════════════════
    const ALL_PLATFORMS = [
      { id:"whatsapp",  label:"WhatsApp",      emoji:"💬", status:"ready" },
      { id:"imessage",  label:"iMessage",      emoji:"🍎", status:"soon"  },
      { id:"telegram",  label:"Telegram",      emoji:"✈️", status:"soon"  },
      { id:"discord",   label:"Discord",       emoji:"🎮", status:"soon"  },
      { id:"signal",    label:"Signal",        emoji:"🔒", status:"soon"  },
      { id:"other",     label:"Other",         emoji:"💬", status:"soon"  },
    ];

    function Screen1({ data, setData, onNext }) {
      const [selectedPlatform, setSelectedPlatform] = useState("whatsapp");
      const [parsing, setParsing] = useState(false);
      const [dragOver, setDragOver] = useState(false);
      const [error, setError] = useState("");
      const fileRef = useRef();

      // Waitlist state
      const [waitlistChecked, setWaitlistChecked] = useState({});
      const [waitlistEmail, setWaitlistEmail] = useState("");
      const [waitlistSubmitted, setWaitlistSubmitted] = useState(false);
      const [otherPlatformText, setOtherPlatformText] = useState("");

      function selectPlatform(id) {
        setSelectedPlatform(id);
        setError("");
        setWaitlistSubmitted(false);
        setWaitlistEmail("");
        setOtherPlatformText("");
        // pre-check the clicked platform in the multi-select
        if (id !== "whatsapp") {
          setWaitlistChecked(prev => ({ ...prev, [id]: true }));
        }
      }

      function toggleWaitlistPlatform(id) {
        setWaitlistChecked(prev => ({ ...prev, [id]: !prev[id] }));
      }

      function submitWaitlist() {
        if (!waitlistEmail.trim() || !waitlistEmail.includes("@")) return;
        const nonWhatsapp = ALL_PLATFORMS.filter(p => p.status === "soon");
        const selected = nonWhatsapp.filter(p => waitlistChecked[p.id] && p.id !== "other").map(p => p.label);
        const payload = { email: waitlistEmail.trim(), platforms: selected };
        if (waitlistChecked["other"] && otherPlatformText.trim()) {
          payload.otherPlatform = otherPlatformText.trim();
        }
        console.log("Waitlist signup:", payload);
        setWaitlistSubmitted(true);
      }

      async function parseZip(f) {
        setParsing(true);
        setError("");
        try {
          const zip = await JSZip.loadAsync(f);
          let chatEntry = null;
          zip.forEach((path, entry) => {
            if (!entry.dir && path.replace(/.*\//, "") === "_chat.txt" && !chatEntry) chatEntry = entry;
          });
          if (!chatEntry) {
            zip.forEach((path, entry) => {
              if (!entry.dir && path.endsWith(".txt") && !chatEntry) chatEntry = entry;
            });
          }
          if (!chatEntry) throw new Error("No _chat.txt found in the zip. Please export your WhatsApp chat and try again.");
          const text = await chatEntry.async("string");
          const names = parseParticipants(text);
          if (names.length === 0) throw new Error("Could not find any participant names. Make sure the export includes message history.");
          setData(d => ({ ...d, platform:"whatsapp", file: f, participants: names, chatText: text }));
        } catch(e) {
          setError(e.message);
        }
        setParsing(false);
      }

      function handleFile(f) {
        if (!f) return;
        if (f.size > 500 * 1024 * 1024) { setError("File must be under 500MB."); return; }
        if (!f.name.endsWith(".zip")) { setError("Please upload a .zip file."); return; }
        parseZip(f);
      }

      function handleDrop(e) {
        e.preventDefault(); setDragOver(false);
        handleFile(e.dataTransfer.files[0]);
      }

      function advance() {
        if (selectedPlatform === "whatsapp") {
          if (!data.file) { setError("Please upload your WhatsApp export to continue."); return; }
          setData(d => ({ ...d, platform:"whatsapp" }));
          onNext();
        }
        // For waitlist flows, Next button is replaced by the submit+thank-you state
      }

      const clickedLabel = ALL_PLATFORMS.find(p => p.id === selectedPlatform)?.label || "";

      return (
        <div>
          <div style={{ fontSize:10, fontWeight:500, letterSpacing:"0.2em", textTransform:"uppercase", color:"#ccc", marginBottom:12 }}>Platform</div>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:28, fontWeight:700, color:"#111", marginBottom:8, lineHeight:1.2 }}>Where does your group chat live?</h2>
          <p style={{ fontSize:14, fontWeight:300, color:"#888", marginBottom:32, lineHeight:1.7 }}>Start with WhatsApp. More platforms are on the way — tell us which ones matter to you.</p>

          {/* 2×3 platform grid */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:32 }}>
            {ALL_PLATFORMS.map(p => {
              const isSelected = selectedPlatform === p.id;
              const isReady = p.status === "ready";
              return (
                <button key={p.id} onClick={() => selectPlatform(p.id)} style={{
                  display:"flex", flexDirection:"column", alignItems:"flex-start",
                  padding:"16px 18px", gap:6,
                  border: isSelected ? "2px solid #111" : "1px solid #e0e0e0",
                  background: isSelected ? "#fafafa" : "#fff",
                  cursor:"pointer", textAlign:"left", transition:"all 0.15s",
                  fontFamily:"'DM Sans',sans-serif",
                }}>
                  <div style={{ fontSize:22 }}>{p.emoji}</div>
                  <div style={{ fontSize:14, fontWeight:500, color:"#111" }}>{p.label}</div>
                  <div style={{
                    fontSize:10, fontWeight:500, letterSpacing:"0.1em", textTransform:"uppercase",
                    background: isReady ? "#111" : "#f0f0f0",
                    color: isReady ? "#fff" : "#aaa",
                    padding:"2px 7px",
                  }}>
                    {isReady ? "Ready now" : p.id === "other" ? "Tell us" : "Coming soon"}
                  </div>
                </button>
              );
            })}
          </div>

          {/* Panel below grid — changes based on selected platform */}

          {/* WhatsApp panel */}
          {selectedPlatform === "whatsapp" && (
            <div>
              {/* How-to instructions */}
              <div style={{ background:"#fafafa", border:"1px solid #f0f0f0", padding:"16px 20px", marginBottom:20 }}>
                <div style={{ fontSize:11, fontWeight:500, color:"#aaa", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:10 }}>How to export</div>
                {[
                  "Open WhatsApp and go to the group chat.",
                  "Tap the group name at the top to open group info.",
                  "Scroll down and tap Export Chat.",
                  "Choose With Media to include photos and videos.",
                  "Save or share the .zip file, then upload it below.",
                ].map((s,i) => (
                  <div key={i} style={{ display:"flex", gap:10, marginBottom:6 }}>
                    <div style={{ fontFamily:"'Playfair Display',serif", fontSize:13, color:"#ddd", fontWeight:700, flexShrink:0, lineHeight:1.6 }}>{i+1}</div>
                    <div style={{ fontSize:13, fontWeight:300, color:"#666", lineHeight:1.6 }}>{s}</div>
                  </div>
                ))}
              </div>

              {/* Drop zone */}
              <div
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={handleDrop}
                onClick={() => fileRef.current.click()}
                style={{ border:dragOver?"2px solid #111":"2px dashed #ddd", padding:"32px 24px", textAlign:"center", cursor:"pointer", background:dragOver?"#f5f5f5":"#fff", transition:"all 0.15s", marginBottom:8 }}
              >
                <input ref={fileRef} type="file" accept=".zip" style={{ display:"none" }} onChange={e => handleFile(e.target.files[0])} />
                {parsing ? (
                  <div>
                    <div style={{ width:22, height:22, border:"2px solid #111", borderTopColor:"transparent", borderRadius:"50%", animation:"spin 0.7s linear infinite", margin:"0 auto 10px" }} />
                    <div style={{ fontSize:13, color:"#888" }}>Parsing your chat…</div>
                  </div>
                ) : data.file ? (
                  <div>
                    <div style={{ fontSize:22, marginBottom:6 }}>✓</div>
                    <div style={{ fontSize:14, fontWeight:500, color:"#111", marginBottom:4 }}>{data.file.name}</div>
                    <div style={{ fontSize:12, color:"#aaa" }}>
                      {data.participants?.length > 0 ? `Found ${data.participants.length} participants` : "File ready"}{" · "}Click to replace
                    </div>
                  </div>
                ) : (
                  <div>
                    <div style={{ fontSize:28, marginBottom:8 }}>📁</div>
                    <div style={{ fontSize:14, fontWeight:400, color:"#555", marginBottom:4 }}>Drop your .zip file here</div>
                    <div style={{ fontSize:12, color:"#bbb" }}>or click to browse · max 500MB</div>
                  </div>
                )}
              </div>
              <ErrorMsg msg={error} />

              {/* Next button — only shown after successful upload */}
              {data.file && !parsing && (
                <div style={{ display:"flex", gap:12, marginTop:32, paddingTop:24, borderTop:"1px solid #f0f0f0" }}>
                  <Btn onClick={advance} style={{ marginLeft:"auto" }}>Next →</Btn>
                </div>
              )}
            </div>
          )}

          {/* Unified waitlist panel — shown for any non-WhatsApp platform */}
          {selectedPlatform !== "whatsapp" && (
            <div style={{ border:"1px solid #e0e0e0", padding:"24px 20px", background:"#fafafa" }}>
              {waitlistSubmitted ? (
                <div style={{ textAlign:"center", padding:"8px 0" }}>
                  <div style={{ fontSize:28, marginBottom:12 }}>✓</div>
                  <div style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:700, color:"#111", marginBottom:8 }}>You're on the list.</div>
                  <div style={{ fontSize:13, fontWeight:300, color:"#888", lineHeight:1.7, marginBottom:20 }}>We'll email you the moment your platforms are ready.</div>
                  <a href="#" onClick={e => { e.preventDefault(); selectPlatform("whatsapp"); }} style={{ fontSize:13, color:"#111", fontWeight:500, textDecoration:"underline", fontFamily:"'DM Sans',sans-serif" }}>
                    Start with WhatsApp instead →
                  </a>
                </div>
              ) : (
                <div>
                  <div style={{ fontSize:14, fontWeight:500, color:"#111", marginBottom:6 }}>
                    We're building support for more platforms.
                  </div>
                  <div style={{ fontSize:13, fontWeight:300, color:"#888", lineHeight:1.6, marginBottom:20 }}>
                    Leave your email and we'll notify you the moment yours is ready.
                  </div>

                  {/* Multi-select checkboxes — all non-WhatsApp platforms */}
                  <div style={{ marginBottom: waitlistChecked["other"] ? 12 : 16 }}>
                    <div style={{ fontSize:10, fontWeight:500, letterSpacing:"0.15em", textTransform:"uppercase", color:"#aaa", marginBottom:10 }}>Which platforms do you use?</div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                      {ALL_PLATFORMS.filter(p => p.id !== "whatsapp").map(p => (
                        <label key={p.id} style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 12px", border: waitlistChecked[p.id] ? "1px solid #111" : "1px solid #e0e0e0", background: waitlistChecked[p.id] ? "#111" : "#fff", cursor:"pointer", transition:"all 0.1s" }}>
                          <input type="checkbox" checked={!!waitlistChecked[p.id]} onChange={() => toggleWaitlistPlatform(p.id)} style={{ display:"none" }} />
                          <span style={{ fontSize:13 }}>{p.emoji}</span>
                          <span style={{ fontSize:12, fontWeight:500, color: waitlistChecked[p.id] ? "#fff" : "#555", fontFamily:"'DM Sans',sans-serif" }}>{p.label}</span>
                        </label>
                      ))}
                    </div>
                  </div>

                  {/* "Other" text field — only visible when Other checkbox is checked */}
                  {waitlistChecked["other"] && (
                    <div style={{ marginBottom:16 }}>
                      <input type="text" value={otherPlatformText} onChange={e => setOtherPlatformText(e.target.value)}
                        placeholder="Which platform? e.g. GroupMe, Line, WeChat…"
                        style={{ ...inputStyle }} />
                    </div>

    // ══════════════════════════════════════════════
    // SCREEN 5 — Episodes + Customization
    // Parses real timestamps from chatText to find
    // natural episode breaks (14+ day gaps), then
    // displays a read-only episode list with date
    // ranges. Merges down to ≤8 episodes if needed.
    // ══════════════════════════════════════════════

    const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    function fmtMonthYear(d) {
      return MONTH_NAMES[d.getMonth()] + " " + d.getFullYear();
    }

    // Parse every message timestamp from WhatsApp chatText.
    // Returns sorted array of Date objects.
    function parseMessageDates(text) {
      if (!text) return [];
      const lines = text.split("\n");
      // iOS:     [12/25/23, 10:30:45 AM]
      const iosRe = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*\d{1,2}:\d{2}/;
      // Android: 12/25/23, 10:30 AM - or 25/12/2023, 22:30 -
      const androidRe = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*\d{1,2}:\d{2}/;
      const dates = [];
      for (const line of lines) {
        let m = line.match(iosRe) || line.match(androidRe);
        if (!m) continue;
        let a = parseInt(m[1], 10);
        let b = parseInt(m[2], 10);
        let y = parseInt(m[3], 10);
        if (y < 100) y += 2000;
        // WhatsApp iOS is MM/DD/YY; Android can be DD/MM/YYYY or MM/DD/YYYY.
        // Heuristic: if a > 12, it must be DD (day). Otherwise assume MM/DD (US).
        let month, day;
        if (a > 12) { day = a; month = b; }
        else        { month = a; day = b; }
        if (month < 1 || month > 12 || day < 1 || day > 31) continue;
        dates.push(new Date(y, month - 1, day));
      }
      dates.sort((x, y2) => x - y2);
      return dates;
    }

    // Build episode segments from sorted dates array.
    // A new episode starts after a gap of ≥ GAP_DAYS days.
    function buildEpisodes(dates, GAP_DAYS = 14) {
      if (dates.length === 0) return [];
      const episodes = [];
      let start = dates[0];
      let prev  = dates[0];
      for (let i = 1; i < dates.length; i++) {
        const gapMs = dates[i] - prev;
        const gapDays = gapMs / (1000 * 60 * 60 * 24);
        if (gapDays >= GAP_DAYS) {
          episodes.push({ start, end: prev });
          start = dates[i];
        }
        prev = dates[i];
      }
      episodes.push({ start, end: prev });
      return episodes;
    }

    const MIN_EP_DAYS = 21;
    const DAY_MS = 1000 * 60 * 60 * 24;

    // Merge any episode shorter than MIN_EP_DAYS into the shorter of its neighbors.
    function enforceMinDuration(episodes) {
      let eps = episodes.slice();
      let changed = true;
      while (changed && eps.length > 1) {
        changed = false;
        for (let i = 0; i < eps.length; i++) {
          const dur = (eps[i].end - eps[i].start) / DAY_MS;
          if (dur < MIN_EP_DAYS) {
            // merge with the neighbor that produces the shorter combined episode
            const mergeLeft  = i > 0 ? (eps[i].end - eps[i - 1].start) / DAY_MS : Infinity;
            const mergeRight = i < eps.length - 1 ? (eps[i + 1].end - eps[i].start) / DAY_MS : Infinity;
            const idx = mergeLeft <= mergeRight ? i - 1 : i;
            const merged = { start: eps[idx].start, end: eps[idx + 1].end };
            eps.splice(idx, 2, merged);
            changed = true;
            break; // restart scan after any merge
          }
        }
      }
      return eps;
    }

    // Merge the shortest adjacent pair until count ≤ MAX.
    function mergeEpisodes(episodes, MAX = 8) {
      let eps = enforceMinDuration(episodes);
      while (eps.length > MAX) {
        let minSpan = Infinity, minIdx = 0;
        for (let i = 0; i < eps.length - 1; i++) {
          const span = eps[i + 1].end - eps[i].start;
          if (span < minSpan) { minSpan = span; minIdx = i; }
        }
        const merged = { start: eps[minIdx].start, end: eps[minIdx + 1].end };
        eps.splice(minIdx, 1, merged);
        eps.splice(minIdx + 1, 1);
      }
      return eps;
    }

    // Convert episodes to display objects with a date range label.
    function episodesToDisplayList(episodes) {
      return episodes.map(ep => {
        const label = fmtMonthYear(ep.start) === fmtMonthYear(ep.end)
          ? fmtMonthYear(ep.start)
          : fmtMonthYear(ep.start) + " – " + fmtMonthYear(ep.end);
        return { dateRange: label };
      });
    }

    // Compute total span in whole months between first and last message.
    function spanMonths(first, last) {
      return (last.getFullYear() - first.getFullYear()) * 12 + (last.getMonth() - first.getMonth());
    }

    function Screen5({ data, setData, onBack, onNext }) {
      // Compute episodes and summary once from chatText
      const [episodes] = useState(() => {
        const dates = parseMessageDates(data.chatText || "");
        if (dates.length === 0) return [];
        const raw = buildEpisodes(dates, 14);

        return episodesToDisplayList(merged);
      });

        return `Your chat spans ${months} month${months !== 1 ? "s" : ""}. We've organized it into ${merged.length} episode${merged.length !== 1 ? "s" : ""}.`;
      });

      const [dedication, setDedication] = useState(data.dedication || "");

      function advance() {

      return (
        <div>
          <div style={{ fontSize:10, fontWeight:500, letterSpacing:"0.2em", textTransform:"uppercase", color:"#ccc", marginBottom:12 }}>Episodes</div>

          {summaryLine && (
            <div style={{ marginBottom:24, padding:"14px 18px", background:"#f7f7f7", border:"1px solid #e8e8e8" }}>

            </div>
          )}

          {/* Read-only episode list */}
          {episodes.length > 0 && (
            <div style={{ marginBottom:36 }}>
              {episodes.map((ep, i) => (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:16, padding:"12px 0", borderBottom:"1px solid #f0f0f0" }}>
                  <div style={{ fontFamily:"'Playfair Display',serif", fontSize:13, color:"#ddd", fontWeight:700, flexShrink:0, minWidth:20, textAlign:"right" }}>{i + 1}</div>
                  <div style={{ fontSize:13, fontWeight:400, color:"#555" }}>Episode {i + 1}</div>

                </div>
              ))}
            </div>

          {/* Dedication */}

            <FieldLabel>Dedication <span style={{ textTransform:"none", color:"#ccc", fontWeight:300, letterSpacing:0 }}>(optional)</span></FieldLabel>
            <p style={{ fontSize:12, fontWeight:300, color:"#aaa", marginBottom:10, lineHeight:1.6 }}>Appears on the dedication page at the front of the book. Max 200 characters.</p>
            <textarea
              value={dedication}
              onChange={e => setDedication(e.target.value.slice(0,200))}
              placeholder="e.g. For everyone who never learned to read the room. You know who you are."
              rows={3}
              style={{ width:"100%", padding:"11px 14px", border:"1px solid #e0e0e0", fontSize:14, fontWeight:300, color:"#111", fontFamily:"'DM Sans',sans-serif", resize:"vertical", outline:"none", lineHeight:1.6 }}
            />
            <div style={{ fontSize:11, color:"#ccc", textAlign:"right", marginTop:4 }}>{dedication.length}/200</div>
          </div>

          {/* Closing note */}
          <div style={{ marginBottom:8 }}>
            <FieldLabel>Closing note <span style={{ textTransform:"none", color:"#ccc", fontWeight:300, letterSpacing:0 }}>(optional)</span></FieldLabel>
            <p style={{ fontSize:12, fontWeight:300, color:"#aaa", marginBottom:10, lineHeight:1.6 }}>Appears on the final page. A note from you to everyone in the book. Max 400 characters.</p>
            <textarea
              value={closingNote}
              onChange={e => setClosingNote(e.target.value.slice(0,400))}
              placeholder="e.g. Thanks for being the kind of people worth printing. Season 2 pending."
              rows={4}
              style={{ width:"100%", padding:"11px 14px", border:"1px solid #e0e0e0", fontSize:14, fontWeight:300, color:"#111", fontFamily:"'DM Sans',sans-serif", resize:"vertical", outline:"none", lineHeight:1.6 }}
            />
            <div style={{ fontSize:11, color:"#ccc", textAlign:"right", marginTop:4 }}>{closingNote.length}/400</div>
          </div>

          <NavBtns onBack={onBack} onNext={advance} />
        </div>
      );
    }

    // ══════════════════════════════════════════════
    // SCREEN 6 — Preview
    // ══════════════════════════════════════════════
    function Screen6({ data, setData, onBack, onNext }) {
      const [email, setEmail] = useState(data.proofEmail || "");
      const [error, setError] = useState("");
      const vibe = VIBES.find(v => v.id === data.vibeId) || VIBES[0];
      const foil = FOILS.find(f => f.id === data.foilId) || FOILS[0];
      const cover = data.coverColor || vibe.cover;
      const spine = data.spineColor || vibe.spine;
      const foilColor = data.foilColor || foil.color;

      function advance() {
        if (!email.trim() || !email.includes("@")) { setError("Please enter a valid email for proof delivery."); return; }
        setData(d => ({ ...d, proofEmail:email.trim() }));
        onNext();
      }

      return (
        <div>
          <div style={{ fontSize:10, fontWeight:500, letterSpacing:"0.2em", textTransform:"uppercase", color:"#ccc", marginBottom:12 }}>Almost there</div>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:28, fontWeight:700, color:"#111", marginBottom:8, lineHeight:1.2 }}>Looking good.</h2>
          <p style={{ fontSize:14, fontWeight:300, color:"#888", marginBottom:32, lineHeight:1.7 }}>This is your cover. Once you order, it ships within 2 weeks.</p>

          <div style={{ marginBottom:40 }}>
            <Book cover={cover} spine={spine} foilColor={foilColor} title={data.bookName} season={data.season} />
          </div>

          <div style={{ padding:"20px 24px", background:"#fafafa", border:"1px solid #f0f0f0", marginBottom:28 }}>
            <div style={{ fontSize:14, fontWeight:500, color:"#111", marginBottom:8 }}>What happens next</div>
            <div style={{ fontSize:13, fontWeight:300, color:"#888", lineHeight:1.7 }}>Once your order is placed, your book goes straight to print and ships within 2 weeks.</div>
          </div>

          <div style={{ marginBottom:8 }}>
            <FieldLabel>Email for proof delivery</FieldLabel>
            <input type="text" value={email} placeholder="your@email.com"
              onChange={e => { setEmail(e.target.value); setError(""); }}
              style={inputStyle} />
            <ErrorMsg msg={error} />
          </div>

          <NavBtns onBack={onBack} onNext={advance} nextLabel="Continue to checkout →" />
        </div>
      );
    }

    // ══════════════════════════════════════════════
    // SCREEN 7 — Checkout
    // BUG 2 FIX: AddrForm moved to module level (above)
    // BUG 3 FIX: sends individual named fields matching backend expectations
    // ══════════════════════════════════════════════
    function Screen7({ data, onBack }) {
      const [qty, setQty] = useState(data.qty || 1);
      const [shipMode, setShipMode] = useState(data.shipMode || "single");
      const [singleAddr, setSingleAddr] = useState(data.singleAddr || { name:"", line1:"", line2:"", city:"", state:"", zip:"", country:"US" });
      const [multiAddrs, setMultiAddrs] = useState(data.multiAddrs || [{ name:"", line1:"", line2:"", city:"", state:"", zip:"", country:"US" }]);
      const [consent, setConsent] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState("");

      const vibe = VIBES.find(v => v.id === data.vibeId) || VIBES[0];
      const foil = FOILS.find(f => f.id === data.foilId) || FOILS[0];
      const price = 89;
      const total = price * qty;

      function addAddr() {
        if (multiAddrs.length < 10) setMultiAddrs(a => [...a, { name:"", line1:"", line2:"", city:"", state:"", zip:"", country:"US" }]);
      }
      function removeAddr(i) { setMultiAddrs(a => a.filter((_,idx) => idx!==i)); }

      async function handleSubmit() {
        if (!consent) { setError("Please agree to the terms to continue."); return; }
        const primaryAddr = shipMode === "single" ? singleAddr : multiAddrs[0];
        if (!primaryAddr.name || !primaryAddr.line1 || !primaryAddr.city || !primaryAddr.state || !primaryAddr.zip) {
          setError("Please complete the shipping address."); return;
        }
        setSubmitting(true);
        setError("");

        try {
          const fd = new FormData();

          // attach the zip file
          if (data.file) fd.append("file", data.file);

          // BUG 3 FIX: individual named fields the dashboard reads
          fd.append("group_name",       data.bookName || "");
          fd.append("customer_name",    primaryAddr.name);
          fd.append("customer_email",   data.proofEmail || "");
          fd.append("platform",         data.platform || "whatsapp");
          fd.append("season",           String(data.season || 1));
          fd.append("cover_color",      data.coverLabel || vibe.label);
          fd.append("cover_hex",        data.coverColor || vibe.cover);
          fd.append("foil_color",       data.foilLabel || foil.label);
          fd.append("quantity",         String(qty));
          fd.append("total",            String(total));
          fd.append("shipping_mode",    shipMode);
          fd.append("shipping_name",    primaryAddr.name);
          fd.append("shipping_line1",   primaryAddr.line1);
          fd.append("shipping_line2",   primaryAddr.line2 || "");
          fd.append("shipping_city",    primaryAddr.city);
          fd.append("shipping_state",   primaryAddr.state);
          fd.append("shipping_zip",     primaryAddr.zip);
          fd.append("shipping_country", primaryAddr.country || "US");
          fd.append("dedication",       data.dedication || "");
          fd.append("closing_note",     data.closingNote || "");
          fd.append("nicknames",        JSON.stringify(data.nicknames || {}));
          fd.append("episodes",         JSON.stringify(data.episodes || []));

          // also send full order JSON for backward compat / dashboard detail view
          fd.append("order", JSON.stringify({
            group_name: data.bookName, customer_name: primaryAddr.name,
            customer_email: data.proofEmail, platform: data.platform,
            season: data.season, cover_color: data.coverLabel || vibe.label,
            cover_hex: data.coverColor || vibe.cover, foil_color: data.foilLabel || foil.label,
            quantity: qty, total, shipping_mode: shipMode,
            shipping_address: primaryAddr, multi_addresses: shipMode==="multiple" ? multiAddrs : null,
            dedication: data.dedication, closing_note: data.closingNote,
            nicknames: data.nicknames, episodes: data.episodes, proof_email: data.proofEmail,
            date_mode: data.dateMode, date_from: data.dateFrom, date_to: data.dateTo,
          }));

          if (shipMode === "multiple") {
            fd.append("multi_addresses", JSON.stringify(multiAddrs));
          }

          const res = await fetch("https://aware-nature-production-7dda.up.railway.app/upload", {
            method: "POST",
            body: fd,
          });

          if (!res.ok) throw new Error("Upload failed (" + res.status + ")");
          localStorage.removeItem("chatbook_order_draft"); // Fix 1: clear draft on success
          window.location.href = "https://buy.stripe.com/4gM28q0Rd3u83ti5U5gbm00";
        } catch(e) {
          setError("Something went wrong: " + e.message + ". Please try again or email hello@ourchatbook.com.");
          setSubmitting(false);
        }
      }

      return (
        <div>
          <div style={{ fontSize:10, fontWeight:500, letterSpacing:"0.2em", textTransform:"uppercase", color:"#ccc", marginBottom:12 }}>Checkout</div>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:28, fontWeight:700, color:"#111", marginBottom:8, lineHeight:1.2 }}>Let's make it real.</h2>
          <p style={{ fontSize:14, fontWeight:300, color:"#888", marginBottom:32, lineHeight:1.7 }}>Tell us where to ship it. Your book ships within 2 weeks.</p>

          <div style={{ border:"1px solid #f0f0f0", marginBottom:28 }}>
            <div style={{ padding:"16px 20px", borderBottom:"1px solid #f0f0f0", background:"#fafafa" }}>
              <div style={{ fontSize:12, fontWeight:500, letterSpacing:"0.1em", textTransform:"uppercase", color:"#aaa" }}>Order summary</div>
            </div>
            {[
              ["Book name",   data.bookName || "—"],
              ["Season",      `Season ${data.season || 1}`],
              ["Cover",       `${data.coverLabel || vibe.label} · ${data.foilLabel || foil.label} foil`],
              ["Format",      "8.5×11 hardcover, linen wrap"],
              ["Proof email", data.proofEmail || "—"],
              ...(data.dedication ? [["Dedication", data.dedication.slice(0,60)+(data.dedication.length>60?"…":"")]] : []),
            ].map(([k,v]) => (
              <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"12px 20px", borderBottom:"1px solid #f0f0f0" }}>
                <span style={{ fontSize:13, fontWeight:300, color:"#888" }}>{k}</span>
                <span style={{ fontSize:13, fontWeight:400, color:"#111", maxWidth:"55%", textAlign:"right" }}>{v}</span>
              </div>
            ))}
          </div>

          <div style={{ marginBottom:24 }}>
            <FieldLabel>Quantity</FieldLabel>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <button onClick={() => setQty(q => Math.max(1,q-1))} style={{ width:36, height:36, border:"1px solid #e0e0e0", background:"#fff", fontSize:18, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>−</button>
              <span style={{ width:40, textAlign:"center", fontSize:16, fontWeight:500 }}>{qty}</span>
              <button onClick={() => setQty(q => Math.min(10,q+1))} style={{ width:36, height:36, border:"1px solid #e0e0e0", background:"#fff", fontSize:18, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>+</button>
              <span style={{ fontSize:13, color:"#aaa", marginLeft:8 }}>max 10</span>
            </div>
          </div>

          <div style={{ marginBottom:20 }}>
            <FieldLabel>Shipping</FieldLabel>
            <div style={{ display:"flex", gap:0, marginBottom:16 }}>
              {[["single","Single address"],["multiple","Multiple addresses"]].map(([val,label]) => (
                <button key={val} onClick={() => setShipMode(val)} style={{ padding:"10px 18px", border:"1px solid #e0e0e0", background:shipMode===val?"#111":"#fff", color:shipMode===val?"#fff":"#555", fontSize:13, fontWeight:500, cursor:"pointer", fontFamily:"'DM Sans',sans-serif", marginRight:-1 }}>{label}</button>
              ))}
            </div>

            {shipMode === "single" && (
              <AddrForm addr={singleAddr} onChange={(field,val) => setSingleAddr(a => ({ ...a, [field]:val }))} />
            )}

            {shipMode === "multiple" && (
              <div>
                <div style={{ fontSize:12, color:"#aaa", marginBottom:12 }}>Add up to 10 shipping addresses — one book per address.</div>
                {multiAddrs.map((a, i) => (
                  <div key={i}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                      <div style={{ fontSize:12, fontWeight:500, color:"#aaa", letterSpacing:"0.08em" }}>Address {i+1}</div>
                      {i > 0 && <button onClick={() => removeAddr(i)} style={{ background:"none", border:"none", fontSize:12, color:"#ccc", cursor:"pointer" }}>Remove</button>}
                    </div>
                    <AddrForm addr={a} onChange={(field,val) => setMultiAddrs(addrs => addrs.map((x,idx) => idx===i ? { ...x, [field]:val } : x))} />
                  </div>
                ))}
                {multiAddrs.length < 10 && (
                  <button onClick={addAddr} style={{ width:"100%", padding:"10px", border:"1px dashed #ddd", background:"none", fontSize:13, color:"#aaa", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", marginBottom:8 }}>+ Add another address</button>
                )}
              </div>
            )}
          </div>

          <div style={{ padding:"16px 20px", background:"#fafafa", border:"1px solid #f0f0f0", marginBottom:24, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontSize:13, fontWeight:300, color:"#888" }}>{qty} × $89</div>
              <div style={{ fontSize:11, fontWeight:300, color:"#bbb", marginTop:2 }}>+ shipping calculated at checkout</div>
            </div>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:26, fontWeight:700, color:"#111" }}>${total}</div>
          </div>

          <label style={{ display:"flex", gap:12, alignItems:"flex-start", cursor:"pointer", marginBottom:24, padding:"16px", border:consent?"1px solid #111":"1px solid #e0e0e0", background:consent?"#fafafa":"#fff" }}>
            <input type="checkbox" checked={consent} onChange={e => { setConsent(e.target.checked); setError(""); }}
              style={{ marginTop:2, flexShrink:0, width:16, height:16, cursor:"pointer" }} />
            <div style={{ fontSize:13, fontWeight:300, color:"#555", lineHeight:1.6 }}>
              I've got consent from everyone in this chat to be included in a printed book.{" "}
              <span style={{ color:"#aaa" }}>Don't buy this if your friends aren't cool with it.</span>
            </div>
          </label>

          <ErrorMsg msg={error} />

          <div style={{ paddingTop:16, borderTop:"1px solid #f0f0f0", marginTop:8 }}>
            <div style={{ display:"flex", gap:12, alignItems:"center" }}>
              <Btn variant="secondary" onClick={onBack}>← Back</Btn>
              <button onClick={handleSubmit} disabled={submitting} style={{ flex:1, padding:"15px 0", background:submitting?"#555":"#111", color:"#fff", border:"none", fontSize:15, fontWeight:500, cursor:submitting?"not-allowed":"pointer", fontFamily:"'DM Sans',sans-serif", transition:"background 0.15s" }}>
                {submitting ? (
                  <span style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10 }}>
                    <span style={{ display:"inline-block", width:16, height:16, border:"2px solid #fff", borderTopColor:"transparent", borderRadius:"50%", animation:"spin 0.7s linear infinite" }} />
                    Uploading…
                  </span>
                ) : `Pay Now · $${total}`}
              </button>
            </div>
            <div style={{ marginTop:12, fontSize:11, fontWeight:300, color:"#bbb", textAlign:"center", lineHeight:1.6 }}>
              Secure payment via Stripe · Your chat data is deleted after processing
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════
    // ROOT
    // Fix 1: localStorage draft save/restore
    // ══════════════════════════════════════════════
    const DRAFT_KEY = "chatbook_order_draft";

    function Builder() {
      const [step, setStep] = useState(1);
      const [data, setData] = useState({});
      const [draft, setDraft] = useState(null); // non-null = show banner
      const TOTAL = 7;

      // Fix 2: browser history — push a state entry for each step
      useEffect(() => {
        // Replace state on first load, push on subsequent steps
        const method = step === 1 ? "replaceState" : "pushState";
        window.history[method]({ step }, "", "#step-" + step);
      }, [step]);

      // Fix 2: handle browser Back/Forward within the wizard
      useEffect(() => {
        function handlePop(e) {
          if (e.state && typeof e.state.step === "number") {
            setStep(e.state.step);
            window.scrollTo(0, 0);
          }
        }
        window.addEventListener("popstate", handlePop);
        return () => window.removeEventListener("popstate", handlePop);
      }, []);

      // On mount: check for saved draft
      useEffect(() => {
        try {
          const saved = localStorage.getItem(DRAFT_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            // only surface banner if they got past step 1
            if (parsed && parsed.step > 1 && parsed.data) {
              setDraft(parsed);
            }
          }
        } catch(e) {}
      }, []);

      // Persist data + step to localStorage whenever they change
      // Skip file/chatText (not serializable or too large)
      useEffect(() => {
        if (step === 1 && Object.keys(data).length === 0) return;
        try {
          const { file, chatText, ...saveable } = data;
          localStorage.setItem(DRAFT_KEY, JSON.stringify({ data: saveable, step }));
        } catch(e) {}
      }, [data, step]);

      function restoreDraft() {
        setData(draft.data);
        setStep(draft.step);
        setDraft(null);
      }

      function dismissDraft() {
        localStorage.removeItem(DRAFT_KEY);
        setDraft(null);
      }

      const next = () => { setStep(s => Math.min(s+1,TOTAL)); window.scrollTo(0,0); };
      const back = () => { setStep(s => Math.max(s-1,1)); window.scrollTo(0,0); };

      const screens = [
        <Screen1 data={data} setData={setData} onNext={next} />,
        <Screen2 data={data} setData={setData} onBack={back} onNext={next} />,
        <Screen3 data={data} setData={setData} onBack={back} onNext={next} />,
        <Screen4 data={data} setData={setData} onBack={back} onNext={next} />,
        <Screen5 data={data} setData={setData} onBack={back} onNext={next} />,
        <Screen6 data={data} setData={setData} onBack={back} onNext={next} />,
        <Screen7 data={data} setData={setData} onBack={back} />,
      ];

      return (
        <div style={{ background:"#fff", minHeight:"100vh", fontFamily:"'DM Sans',sans-serif", fontWeight:300, color:"#111" }}>
          <Nav />

          {/* Draft restore banner */}
          {draft && (
            <div style={{ background:"#111", padding:"14px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
              <div>
                <span style={{ fontSize:13, fontWeight:500, color:"#fff" }}>Continue where you left off</span>
                {draft.data.bookName && <span style={{ fontSize:12, fontWeight:300, color:"#aaa", marginLeft:8 }}>— {draft.data.bookName}</span>}
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={restoreDraft} style={{ padding:"8px 18px", background:"#fff", color:"#111", border:"none", fontSize:12, fontWeight:500, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>
                  Resume (step {draft.step} of {TOTAL})
                </button>
                <button onClick={dismissDraft} style={{ padding:"8px 12px", background:"none", color:"#888", border:"1px solid #444", fontSize:12, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>
                  Start over
                </button>
              </div>
            </div>
          )}

          <ProgressBar step={step} total={TOTAL} />
          <div style={{ maxWidth:600, margin:"0 auto", padding:"40px 24px 80px" }}>
            {screens[step-1]}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Builder />);
  </script>
</body>
</html>
